# dein.vim - Vim environment plugin management
# Note: Neovim uses lazy.nvim (see ~/.config/nvim/init.lua)

# インデントに色を付けて見やすくする
[[plugins]]
repo = 'nathanaelkane/vim-indent-guides'
hook_add = '''
  let g:indent_guides_enable_on_vim_startup = 1
  let g:indent_guides_auto_colors=0
  aug vimindent
    au!
    au VimEnter,Colorscheme * :hi IndentGuidesOdd  guibg=#444433 ctermbg=black
    au VimEnter,Colorscheme * :hi IndentGuidesEven guibg=#333344 ctermbg=darkgray
  aug END
'''

# 置換ハイライト
# Note: Neovim uses built-in inccommand, but Vim needs this plugin
[[plugins]]
repo = 'osyo-manga/vim-over'
hook_add = '''
  nnoremap <silent> <Space>o :OverCommandLine<CR>%s//g<Left><Left>
  vnoremap <silent> <Space>o :OverCommandLine<CR>s//g<Left><Left>
  nnoremap sub :OverCommandLine<CR>%s/<C-r><C-w>//g<Left><Left>
'''

# Commentout shortcut
[[plugins]]
repo = 'tyru/caw.vim'
hook_add = '''
  nmap <Leader>c <Plug>(caw:i:toggle)
  vmap <Leader>c <Plug>(caw:i:toggle)
'''

# 行末の半角スペースを可視化
# Note: Can be handled with listchars, but keeping plugin for Vim compatibility
[[plugins]]
repo = 'bronson/vim-trailing-whitespace'

# molokai カラースキーム
[[plugins]]
repo = 'tomasr/molokai'

# 囲いを簡易化
[[plugins]]
repo = 'tpope/vim-surround'

# editorconfig有効化
[[plugins]]
repo = 'editorconfig/editorconfig-vim'

# ANSI escape sequences
[[plugins]]
repo = 'vim-scripts/AnsiEsc.vim'

# ステータスライン表示
[[plugins]]
repo = 'itchyny/lightline.vim'
hook_add = '''
  let g:lightline = {
    \   'active': {
    \     'left': [ [ 'mode', 'paste' ], [ 'readonly', 'absolutepath', 'modified' ] ],
    \     'right': [ [ 'lineinfo' ], [ 'percent' ], [ 'fileformat', 'fileencoding', 'filetype' ] ]
    \   },
    \   'inactive': {
    \     'left': [ [ 'absolutepath' ] ],
    \     'right': [ [ 'lineinfo' ], [ 'percent' ] ]
    \   },
    \   'tabline': {
    \     'left': [ [ 'tabs' ] ],
    \     'right': [ [ 'close' ] ]
    \   },
    \   'tab': {
    \     'active': [ 'tabnum', 'filename', 'modified' ],
    \     'inactive': [ 'tabnum', 'filename', 'modified' ]
    \   }
    \ }
'''

# git command on Vim
[[plugins]]
repo = 'tpope/vim-fugitive'
hook_add = '''
  nnoremap <silent><C-b> :Gblame<CR>
'''

# git status on Vim
[[plugins]]
repo = 'airblade/vim-gitgutter'
